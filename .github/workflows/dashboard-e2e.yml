name: Dashboard E2E

on:
  push:
    branches: [main, staging]
    paths:
      - ".github/workflows/dashboard-e2e.yml"
      - "apps/api/**"
      - "apps/dashboard/**"
      - "packages/**"
      - "bun.lock"
      - "package.json"
      - "turbo.json"
  pull_request:
    branches: [main, staging]
    paths:
      - ".github/workflows/dashboard-e2e.yml"
      - "apps/api/**"
      - "apps/dashboard/**"
      - "packages/**"
      - "bun.lock"
      - "package.json"
      - "turbo.json"

permissions:
  contents: read

concurrency:
  group: dashboard-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dashboard-e2e:
    name: Dashboard Playwright
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    env:
      DATABUDDY_E2E_BASE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DATABUDDY_E2E_START_CLICKHOUSE: "0"
      DATABUDDY_E2E_SEED_CLICKHOUSE: "1"
      DATABUDDY_E2E_CLICKHOUSE_EVENTS: "150"
      CLICKHOUSE_URL: http://default:@localhost:8123/databuddy_analytics
      REDIS_URL: redis://localhost:6379
      BULLMQ_REDIS_URL: redis://localhost:6379
      BETTER_AUTH_SECRET: databuddy-e2e-secret-at-least-32-bytes
      RESEND_API_KEY: re_e2e_dummy
      AUTUMN_SECRET_KEY: e2e-autumn-secret

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      clickhouse:
        image: clickhouse/clickhouse-server:25.5.1-alpine
        env:
          CLICKHOUSE_DB: databuddy_analytics
          CLICKHOUSE_USER: default
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.11"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - name: Run dashboard E2E
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            bun run --cwd apps/dashboard test:e2e:local:pr
          else
            bun run --cwd apps/dashboard test:e2e:local
          fi
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-e2e-artifacts
          path: |
            apps/dashboard/test-results
            apps/dashboard/playwright-report
          if-no-files-found: ignore
          retention-days: 7
